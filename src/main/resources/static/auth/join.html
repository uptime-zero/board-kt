<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>

<header>
    <a href="../pages/list.html">게시판</a>
</header>

<main>
    <h1>회원가입</h1>

    <form id="signup-form">
        <div id="form-error"></div>

        <div>
            <label for="userId">아이디</label>
            <input type="text" id="userId" name="userId" required>
            <div class="field-error">이미 사용 중인 아이디입니다.</div>
        </div>

        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>
            <div class="field-error">비밀번호는 8자 이상이어야 합니다.</div>
        </div>

        <div>
            <label for="nickname">닉네임</label>
            <input type="text" id="nickname" name="nickname" required>
            <div class="field-error">이미 사용 중인 닉네임입니다.</div>
        </div>

        <button type="submit">가입하기</button>
    </form>

    <p>이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
</main>

<script src="../js/api.js"></script>
<script>
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const userId = document.getElementById("userId").value.trim();
        const password = document.getElementById("password").value;
        const nickname = document.getElementById("nickname").value.trim();

        try {
            await apiFetch("/auth/join", {
                method: "POST",
                body: JSON.stringify({ userId, password, nickname }),
            });

            window.location.href = "login.html";
        } catch (err) {
            showFormError("form-error", err.message || "회원가입에 실패했습니다.");
        }
    });
</script>
</body>
</html>
