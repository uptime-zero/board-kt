<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기</title>
</head>
<body>

<header>
    <a href="list.html">게시판</a>
    <nav>
        <a href="list.html">목록으로</a>
    </nav>
</header>

<main>
    <h1>글쓰기</h1>

    <form id="write-form">
        <div id="form-error"></div>

        <div>
            <label for="title">제목</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div>
            <label for="content">내용</label>
            <textarea id="content" name="content" required></textarea>
        </div>

        <button type="submit">등록하기</button>
    </form>
</main>

<script src="../js/api.js"></script>
<script>
    document.getElementById("write-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("content").value.trim();

        try {
            const post = await apiFetch("/posts", {
                method: "POST",
                body: JSON.stringify({ title, content }),
            });

            window.location.href = `detail.html?id=${post.id}`;
        } catch (err) {
            showFormError("form-error", err.message || "게시글 등록에 실패했습니다.");
        }
    });
</script>
</body>
</html>
